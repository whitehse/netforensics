# LXC config — Profile A (full forensics on Calix/prpl-class CPE)
# Host network namespace + CAP_NET_ADMIN + CAP_NET_RAW
#
# Apply:
#   lxc-create -n netforensics -t none -f deploy/lxc/netforensics-profile-a.conf
#   # or copy keys into prpl LCM / cthulhu EE container config
#
# Prerequisites on host:
#   - sysctl from cpe/sysctl/99-forensics.conf applied
#   - mkdir -p /var/spool/netforensics
#   - rootfs staged (scripts/stage_lxc_rootfs.sh)

lxc.uts.name = netforensics
lxc.arch = aarch64

# --- isolation: keep process/mount isolation, share host networking ---
# Empty netns clone = share host net (LXC 4+ / 5+ syntax variants exist).
# If your LXC requires explicit share:
#   lxc.namespace.share.net = host
# Older:
#   lxc.network.type = none
lxc.namespace.share = net

# Drop everything then keep only what we need (adjust if LXC rejects keep list)
lxc.cap.drop =
lxc.cap.keep = net_admin net_raw net_bind_service setuid setgid chown dac_override

# Resource caps (MIPS/ARM / dual-daemon budget)
lxc.cgroup2.memory.max = 48M
lxc.cgroup2.pids.max = 32
lxc.cgroup.memory.limit_in_bytes = 50331648

# Rootfs (absolute path on device after install)
lxc.rootfs.path = dir:/srv/lxc/netforensics/rootfs

# Shared spool with host Vector tail / dual-daemon
lxc.mount.entry = /var/spool/netforensics var/spool/netforensics none bind,create=dir 0 0

# Optional: host timezone / resolv if not using host net DNS
# lxc.mount.entry = /etc/resolv.conf etc/resolv.conf none bind,ro 0 0

# Autostart entrypoint
lxc.init.cmd = /usr/sbin/netforensics-entrypoint

# Logging
lxc.log.level = warn
lxc.log.file = /var/log/lxc-netforensics.log

# Do not allow device node creation unless needed
lxc.cgroup.devices.deny = a
# Allow null/zero/urandom for basic libc
lxc.cgroup.devices.allow = c 1:3 rwm
lxc.cgroup.devices.allow = c 1:5 rwm
lxc.cgroup.devices.allow = c 1:8 rwm
lxc.cgroup.devices.allow = c 1:9 rwm
