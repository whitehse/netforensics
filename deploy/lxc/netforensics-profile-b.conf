# LXC config — Profile B (unprivileged demo EE)
# No host net share, no CAP_NET_ADMIN / CAP_NET_RAW.
# Only cpe_agent demo + forensicsd --demo are guaranteed.

lxc.uts.name = netforensics-demo
lxc.arch = aarch64

# Own network namespace (isolated)
# lxc.net.0.type = empty
lxc.net.0.type = none

# Drop dangerous caps; do not keep net_admin/raw
lxc.cap.drop = sys_admin sys_module sys_time sys_rawio sys_ptrace mac_admin mac_override
# Explicitly ensure net_admin not present if your template keeps all:
# lxc.cap.drop = net_admin net_raw

lxc.cgroup2.memory.max = 24M
lxc.cgroup2.pids.max = 16

lxc.rootfs.path = dir:/srv/lxc/netforensics-demo/rootfs

lxc.mount.entry = /var/spool/netforensics var/spool/netforensics none bind,create=dir 0 0

# Demo entrypoint
lxc.init.cmd = /usr/sbin/netforensics-entrypoint --demo

lxc.log.level = warn
lxc.log.file = /var/log/lxc-netforensics-demo.log
