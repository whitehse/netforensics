# OpenWrt / Linux forensics tuning (MODULE 1)
# Install: /etc/sysctl.d/99-forensics.conf

# Conntrack capacity for busy CPE
net.netfilter.nf_conntrack_max = 65536

# Ensure conntrack events are never silently dropped under load
net.netfilter.nf_conntrack_events = 1

# Aggressive prune of stale sessions (seconds) — tune per deployment
net.netfilter.nf_conntrack_udp_timeout = 30
net.netfilter.nf_conntrack_udp_timeout_stream = 60
net.netfilter.nf_conntrack_tcp_timeout_established = 600
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_close_wait = 30
