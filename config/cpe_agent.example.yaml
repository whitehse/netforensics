# CPE agent example config (Track 2 + field path F1–F6).
# Load at start; SIGHUP re-reads this file (CLI --router-id override preserved).

router_id: cpe-lab-1

emit:
  mode: stdout          # stdout | spool | http | https
  # path: /var/spool/netforensics/cpe_perf.ndjson   # required when mode=spool

spool:
  max_lines: 256        # hard max 1024; OpenWrt package uses 128
  # path: /var/spool/netforensics/cpe_perf.ndjson   # alias for emit.path

demo:
  enabled: true         # true=synthetic; false=live ICMP (F4)
  target: "1.1.1.1"
  interval_ms: 5000
  timeout_ms: 1000      # live ICMP/ARP probe wait

# Optional L2 interface for arping (empty = auto: default-route if / br-lan / eth0)
# arping:
#   if: br-lan

# Wi-Fi iface for nl80211 station dumps (empty = first wireless iface / wlan0)
# wifi:
#   if: wlan0

# ---------------------------------------------------------------------------
# Field path: NFLOG:5 TCP stats → edgehost ClickHouse proxy
# Ready-made: config/cpe_agent.field.yaml · lab: cpe_agent.lab-edgehost.yaml
# See docs/guides/cpe-agent-daemon.md · cpe-agent-tcp-stats.md
# ---------------------------------------------------------------------------
# emit:
#   mode: http
# egress:
#   url: "http://174.128.129.0:18082/api/v1/telemetry/events"
#   username: cpe_ingest
#   password: "change-me"
#
# tcp_stats:
#   enabled: true
#   nflog_group: 5
#   nflog_size: 60
#   emit_interval_ms: 10000
#   emit_top_n: 20
#   prefix_len: 24
#
# Host iptables (group must match nflog_group):
#   iptables -I FORWARD 1 -p tcp -m tcp --tcp-flags RST RST \
#     -j NFLOG --nflog-group 5 --nflog-size 60
#   iptables -I FORWARD 1 -p tcp -m tcp --tcp-flags FIN FIN \
#     -j NFLOG --nflog-group 5 --nflog-size 60
#   iptables -I FORWARD 1 -p tcp -m tcp --tcp-flags SYN SYN \
#     -m conntrack --ctstate NEW -j NFLOG --nflog-group 5 --nflog-size 60
# Lua on demand: cpe_ctl tcp_stats | cpe_ctl --lua
#   cpe.tcp_poll / cpe.tcp_stats / cpe.tcp_by_ip / cpe.tcp_by_prefix

# Control socket for cpe_ctl (human/AI Lua front-end)
ipc:
  socket: /var/run/netforensics/cpe_agent.sock   # set "off" to disable

# Optional edgehost proxy URLs (status only / future tools; no direct CH/PG)
# proxies:
#   openai_url: "http://edgehost.example:18080/api/v1/openai/chat/completions"
#   postgres_url: "http://edgehost.example:18080/api/v1/pg/..."
