# Field CPE agent: NFLOG TCP stats → edgehost ClickHouse telemetry proxy.
#
# Architecture (docs/guides/cpe-agent-daemon.md, cpe-agent-tcp-stats.md):
#   iptables NFLOG group 5  →  cpe_agent (this process)
#        │  emit.mode=http
#        ▼
#   174.128.129.0:18082  (firewall DNAT → edgehost CH proxy :18082)
#        │  POST /api/v1/telemetry/events  (type=cpe_tcp NDJSON)
#        ▼
#   edgehost dual-write → ClickHouse edgehost.cpe_tcp_stats
#
# On-demand Lua (local aggregates on the CPE, not a CH client):
#   cpe_ctl status
#   cpe_ctl --lua-eval "print(cpe.tcp_stats().loss_hint)"
#   cpe_agent --lua-file examples/lua/tcp_stats_report.lua --config this-file
#
# Host NFLOG rules (insert reverse order; CAP_NET_ADMIN):
#   iptables -I FORWARD 1 -p tcp -m tcp --tcp-flags RST RST \
#     -j NFLOG --nflog-group 5 --nflog-size 60
#   iptables -I FORWARD 1 -p tcp -m tcp --tcp-flags FIN FIN \
#     -j NFLOG --nflog-group 5 --nflog-size 60
#   iptables -I FORWARD 1 -p tcp -m tcp --tcp-flags SYN SYN \
#     -m conntrack --ctstate NEW -j NFLOG --nflog-group 5 --nflog-size 60

router_id: cpe

emit:
  mode: http

egress:
  # ClickHouse telemetry proxy (CPE-facing after firewall DNAT).
  # 18080 SPA | 18081 Postgres proxy | 18082 ClickHouse proxy
  url: "http://174.128.129.0:18082/api/v1/telemetry/events"
  username: cpe_ingest
  password: "change-me"
  # https + mbedTLS (optional):
  # ca_file: /etc/cpe_agent/ca.crt
  # cert_file: /etc/cpe_agent/client.crt
  # key_file: /etc/cpe_agent/client.key
  # tls_insecure: false

spool:
  max_lines: 128

demo:
  enabled: false          # live path; set true only for synthetic cpe_perf
  target: "1.1.1.1"
  interval_ms: 60000
  timeout_ms: 1000

tcp_stats:
  enabled: true
  nflog_group: 5          # interface "nflog:5" / --nflog-group 5
  nflog_size: 60
  emit_interval_ms: 30000 # summary + top-N → type=cpe_tcp → egress
  emit_top_n: 20
  prefix_len: 24

# Per-flow bandwidth (requires: sysctl net.netfilter.nf_conntrack_acct=1)
flow_acct:
  enabled: true
  poll_interval_ms: 200
  dump_interval_ms: 200
  sample_emit_ms: 2000
  sample_top_n: 32
  emit_destroy: true
  emit_new: false

ipc:
  socket: /var/run/netforensics/cpe_agent.sock

# Operator documentation only (CPE does not open CH/PG sockets directly)
proxies:
  # openai_url: "http://…"
  # postgres_url: "174.128.129.0:18081"   # pqproxy L7
