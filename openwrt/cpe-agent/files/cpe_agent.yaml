# OpenWrt field defaults — NFLOG TCP stats → edgehost ClickHouse proxy.
# Override router_id via --router-id in the init script (%H hostname).

router_id: cpe

emit:
  mode: http

egress:
  # ClickHouse proxy (CPE VIP after firewall DNAT → edgehost telemetry).
  url: "http://174.128.129.0:18082/api/v1/telemetry/events"
  username: cpe_ingest
  password: "change-me"

spool:
  max_lines: 128

demo:
  enabled: false
  target: "1.1.1.1"
  interval_ms: 60000
  timeout_ms: 1000

tcp_stats:
  enabled: true
  nflog_group: 5
  nflog_size: 60
  emit_interval_ms: 30000
  emit_top_n: 15
  prefix_len: 24

ipc:
  socket: /var/run/netforensics/cpe_agent.sock

