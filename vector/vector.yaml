# Vector ingest gateway (MODULE 2) — tuned sketch for ~20k CPE fan-in.
# Authn: terminate mTLS at reverse proxy / load balancer in front of cpe_http;
# Vector itself is not the PKI root (see docs/decisions/008-*.md F5).

data_dir: /var/lib/vector

# Global acknowledgement / API (ops)
api:
  enabled: true
  address: "127.0.0.1:8687"

sources:
  cpe_http:
    type: http_server
    address: "0.0.0.0:8686"
    decoding:
      codec: json
    path: /cpe/v1/events
    # Put nginx/haproxy mTLS in front; do not expose cleartext to the internet.

  cpe_udp:
    type: socket
    mode: udp
    address: "0.0.0.0:9999"
    decoding:
      codec: json
    # UDP is lab/edge only; prefer HTTP + mTLS for production CPE.

  # Local file tail when CPE uses emit.mode=spool (shared dir F6)
  cpe_spool_files:
    type: file
    include:
      - /var/spool/netforensics/*.ndjson
    read_from: beginning
    ignore_checkpoints: false
    fingerprint:
      strategy: device_and_inode
    multiline: null
    decoding:
      codec: json

  ipfix_udp:
    type: socket
    mode: udp
    address: "0.0.0.0:4739"
    decoding:
      codec: bytes
    # Downstream: C sidecar with libipfix → JSON, or Vector WASM/lua later

  # Prefer pure-C sidecar: TCP BMP → libbmp → NDJSON on this socket.
  # See bmp_ingest_demo / nf_bmp_collect_stream.
  bmp_ndjson:
    type: socket
    mode: tcp
    address: "0.0.0.0:5000"
    decoding:
      codec: json

  # Optional: external gobmp (or similar) pre-parsed JSON on Kafka.
  bgp_kafka:
    type: kafka
    bootstrap_servers: "kafka:9092"
    group_id: netforensics-bmp
    topics:
      - gobmp.parsed
    decoding:
      codec: json

transforms:
  cpe_route:
    type: route
    inputs: [cpe_http, cpe_udp, cpe_spool_files]
    route:
      nat: '.type == "cpe_nat"'
      wifi: '.type == "cpe_wifi"'
      # Track 2 / N-A05: CPE agent performance samples
      perf: '.type == "cpe_perf"'

  batch_guard:
    type: remap
    inputs: [cpe_route.nat, cpe_route.wifi, cpe_route.perf, bmp_ndjson, bgp_kafka]
    source: |
      .ingested_at = now()

  # Map cpe_perf NDJSON fields to forensics.cpe_perf_samples columns
  cpe_perf_to_ch:
    type: remap
    inputs: [cpe_route.perf]
    source: |
      .router_id = .router_id
      .ts = .ts
      .probe = .probe
      .target = .target
      .rtt_ms = to_float!(.rtt_ms)
      .loss = to_float!(.loss)
      .meta = encode_json(.meta) ?? "{}"

sinks:
  clickhouse_nat:
    type: clickhouse
    inputs: [cpe_route.nat]
    endpoint: "http://clickhouse:8123"
    database: forensics
    table: cpe_nat_flows_ingest
    compression: gzip
    auth:
      strategy: basic
      user: vector_ingest
      password: "${CLICKHOUSE_PASSWORD-}"
    batch:
      # ~20k CPE × conntrack churn: larger batches, short timeout
      max_events: 20000
      timeout_secs: 2
    buffer:
      type: disk
      # ~1 GiB disk buffer (multiple of 256 MiB page size in older Vector)
      max_size: 1073741824
    skip_unknown_fields: true
    request:
      retry_attempts: 10
      retry_initial_backoff_secs: 1
      retry_max_duration_secs: 120

  clickhouse_wifi:
    type: clickhouse
    inputs: [cpe_route.wifi]
    endpoint: "http://clickhouse:8123"
    database: forensics
    table: cpe_wifi_metrics
    compression: gzip
    batch:
      max_events: 10000
      timeout_secs: 2
    buffer:
      type: disk
      max_size: 536870912
    skip_unknown_fields: true

  clickhouse_cpe_perf:
    type: clickhouse
    inputs: [cpe_perf_to_ch]
    endpoint: "http://clickhouse:8123"
    database: forensics
    table: cpe_perf_samples
    compression: gzip
    batch:
      max_events: 10000
      timeout_secs: 2
    buffer:
      type: disk
      max_size: 268435456
    skip_unknown_fields: true
    # Prefer async inserts on the CH side (sql/005_async_insert_settings.sql)
    query_settings:
      async_insert: 1
      wait_for_async_insert: 0

  clickhouse_bgp:
    type: clickhouse
    inputs: [bmp_ndjson, bgp_kafka]
    endpoint: "http://clickhouse:8123"
    database: forensics
    table: bgp_updates
    compression: gzip
    batch:
      max_events: 5000
      timeout_secs: 2
    buffer:
      type: disk
      max_size: 536870912

  # IPFIX: prefer external decoder → HTTP JSON → this sink
  clickhouse_ipfix:
    type: clickhouse
    inputs: []  # wire after decoder
    endpoint: "http://clickhouse:8123"
    database: forensics
    table: ipfix_flows
    compression: gzip
    batch:
      max_events: 50000
      timeout_secs: 2
    buffer:
      type: disk
      max_size: 2147483648
