# Vector ingest gateway (MODULE 2) — production-oriented skeleton.
# Tune buffer sizes for 20k+ CPE fan-in.

data_dir: /var/lib/vector

sources:
  cpe_http:
    type: http_server
    address: "0.0.0.0:8686"
    decoding:
      codec: json
    path: /cpe/v1/events

  cpe_udp:
    type: socket
    mode: udp
    address: "0.0.0.0:9999"
    decoding:
      codec: json

  ipfix_udp:
    type: socket
    mode: udp
    address: "0.0.0.0:4739"
    decoding:
      codec: bytes
    # Downstream: C sidecar with libipfix → JSON, or Vector WASM/lua later

  # Prefer pure-C sidecar: TCP BMP → libbmp → NDJSON on this socket.
  # See bmp_ingest_demo / nf_bmp_collect_stream.
  bmp_ndjson:
    type: socket
    mode: tcp
    address: "0.0.0.0:5000"
    decoding:
      codec: json

  # Optional: external gobmp (or similar) pre-parsed JSON on Kafka.
  bgp_kafka:
    type: kafka
    bootstrap_servers: "kafka:9092"
    group_id: netforensics-bmp
    topics:
      - gobmp.parsed
    decoding:
      codec: json

transforms:
  cpe_route:
    type: route
    inputs: [cpe_http, cpe_udp]
    route:
      nat: '.type == "cpe_nat"'
      wifi: '.type == "cpe_wifi"'
      # Track 2 / N-A05: CPE agent performance samples
      perf: '.type == "cpe_perf"'

  batch_guard:
    type: remap
    inputs: [cpe_route.nat, cpe_route.wifi, cpe_route.perf, bmp_ndjson, bgp_kafka]
    source: |
      .ingested_at = now()

  # Map cpe_perf NDJSON fields to forensics.cpe_perf_samples columns
  cpe_perf_to_ch:
    type: remap
    inputs: [cpe_route.perf]
    source: |
      .router_id = .router_id
      .ts = .ts
      .probe = .probe
      .target = .target
      .rtt_ms = to_float!(.rtt_ms)
      .loss = to_float!(.loss)
      .meta = encode_json(.meta) ?? "{}"

sinks:
  clickhouse_nat:
    type: clickhouse
    inputs: [cpe_route.nat]
    endpoint: "http://clickhouse:8123"
    database: forensics
    table: cpe_nat_flows_ingest
    compression: gzip
    batch:
      max_events: 5000
      timeout_secs: 1
    buffer:
      type: disk
      max_size: 268435488
    skip_unknown_fields: true

  clickhouse_wifi:
    type: clickhouse
    inputs: [cpe_route.wifi]
    endpoint: "http://clickhouse:8123"
    database: forensics
    table: cpe_wifi_metrics
    compression: gzip
    batch:
      max_events: 2000
      timeout_secs: 1

  clickhouse_cpe_perf:
    type: clickhouse
    inputs: [cpe_perf_to_ch]
    endpoint: "http://clickhouse:8123"
    database: forensics
    table: cpe_perf_samples
    compression: gzip
    batch:
      max_events: 2000
      timeout_secs: 1
    skip_unknown_fields: true

  clickhouse_bgp:
    type: clickhouse
    inputs: [bmp_ndjson, bgp_kafka]
    endpoint: "http://clickhouse:8123"
    database: forensics
    table: bgp_updates
    compression: gzip
    batch:
      max_events: 2000
      timeout_secs: 1

  # IPFIX: prefer external decoder → HTTP JSON → this sink
  clickhouse_ipfix:
    type: clickhouse
    inputs: []  # wire after decoder
    endpoint: "http://clickhouse:8123"
    database: forensics
    table: ipfix_flows
    compression: gzip
    batch:
      max_events: 10000
      timeout_secs: 1
